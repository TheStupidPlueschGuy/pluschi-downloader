name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install flask yt-dlp pyinstaller

      - name: EXE bauen
        run: |
          pyinstaller --onefile --noconsole `
            --name "Plueschi_Downloader" `
            --add-data "templates;templates" `
            app.py

      - name: EXE als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Plueschi_Downloader_Windows
          path: dist/Plueschi_Downloader.exe
