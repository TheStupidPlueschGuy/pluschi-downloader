<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plüschi Downloader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg-glow {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 50%, rgba(139,92,246,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 50%, rgba(236,72,153,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    position: relative;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 520px;
    backdrop-filter: blur(20px);
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }

  .logo {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
  }

  .logo h1 {
    font-size: 26px;
    font-weight: 900;
    background: linear-gradient(135deg, #a78bfa, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  .logo p {
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    margin-top: 4px;
  }

  label {
    display: block;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .url-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 18px;
    color: #fff;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 20px;
  }

  .url-input:focus {
    border-color: rgba(167,139,250,0.5);
    background: rgba(255,255,255,0.08);
  }

  .url-input::placeholder { color: rgba(255,255,255,0.2); }

  .format-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .format-btn {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px;
    color: rgba(255,255,255,0.5);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .format-btn:hover {
    border-color: rgba(167,139,250,0.4);
    color: rgba(255,255,255,0.8);
  }

  .format-btn.active {
    background: linear-gradient(135deg, rgba(139,92,246,0.3), rgba(236,72,153,0.2));
    border-color: rgba(167,139,250,0.7);
    color: #fff;
  }

  .dl-btn {
    width: 100%;
    background: linear-gradient(135deg, #7c3aed, #db2777);
    border: none;
    border-radius: 12px;
    padding: 16px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .dl-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(124,58,237,0.4);
  }

  .dl-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .progress-wrap {
    margin-top: 24px;
    display: none;
  }

  .progress-wrap.show { display: block; }

  .progress-bar-bg {
    background: rgba(255,255,255,0.07);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #7c3aed, #ec4899);
    border-radius: 999px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
  }

  .status-msg {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    display: none;
  }

  .status-msg.show { display: block; }
  .status-msg.success { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
  .status-msg.error { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
  .status-msg.info { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.2); }

  .save-path {
    margin-top: 12px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    text-align: center;
  }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🦊</span>
    <h1>Plüschi Downloader</h1>
    <p>YouTube · TikTok · Twitter · Instagram · 1000+ Seiten</p>
  </div>

  <label>Video-URL eingeben</label>
  <input class="url-input" type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />

  <label>Format</label>
  <div class="format-row">
    <button class="format-btn active" id="btnMp4" onclick="setFormat('mp4')">
      🎬 MP4
    </button>
    <button class="format-btn" id="btnMp3" onclick="setFormat('mp3')">
      🎵 MP3
    </button>
  </div>

  <button class="dl-btn" id="dlBtn" onclick="startDownload()">
    ⬇️ Herunterladen
  </button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-text">
      <span id="progressLabel">Lädt herunter...</span>
      <span id="progressPercent">0%</span>
    </div>
  </div>

  <div class="status-msg" id="statusMsg"></div>
  <div class="save-path" id="savePath"></div>
</div>

<script>
  let selectedFormat = "mp4";
  let polling = null;

  function setFormat(fmt) {
    selectedFormat = fmt;
    document.getElementById("btnMp4").classList.toggle("active", fmt === "mp4");
    document.getElementById("btnMp3").classList.toggle("active", fmt === "mp3");
  }

  function showStatus(msg, type) {
    const el = document.getElementById("statusMsg");
    el.textContent = msg;
    el.className = "status-msg show " + type;
  }

  function setProgress(pct) {
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("progressPercent").textContent = Math.round(pct) + "%";
  }

  async function startDownload() {
    const url = document.getElementById("urlInput").value.trim();
    if (!url) { showStatus("❌ Bitte eine URL eingeben!", "error"); return; }

    document.getElementById("dlBtn").disabled = true;
    document.getElementById("progressWrap").classList.add("show");
    document.getElementById("statusMsg").classList.remove("show");
    document.getElementById("savePath").textContent = "";
    setProgress(0);
    document.getElementById("progressLabel").textContent = "Startet...";

    try {
      const res = await fetch("/download", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, format: selectedFormat })
      });
      const data = await res.json();
      if (data.error) { showStatus("❌ " + data.error, "error"); reset(); return; }
      pollProgress();
    } catch(e) {
      showStatus("❌ Verbindungsfehler!", "error");
      reset();
    }
  }

  function pollProgress() {
    polling = setInterval(async () => {
      try {
        const res = await fetch("/progress");
        const d = await res.json();

        if (d.status === "downloading") {
          setProgress(d.percent || 0);
          document.getElementById("progressLabel").textContent = "Lädt herunter...";
        } else if (d.status === "finished") {
          setProgress(100);
          document.getElementById("progressLabel").textContent = "Fertig!";
          showStatus("✅ Download abgeschlossen! Datei gespeichert in Downloads.", "success");
          clearInterval(polling);
          reset();
        } else if (d.status === "error") {
          showStatus("❌ Fehler: " + (d.error || "Unbekannter Fehler"), "error");
          clearInterval(polling);
          reset();
        }
      } catch(e) {}
    }, 500);
  }

  function reset() {
    setTimeout(() => {
      document.getElementById("dlBtn").disabled = false;
    }, 1500);
  }
</script>
</body>
</html>
